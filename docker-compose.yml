services:
  ribs-newsletter:
    image: dockerjustin98/ribs-newsletter:latest
    # For local development, comment out `image:` above and uncomment `build:` below.
    # build: .
    container_name: ribs-newsletter
    restart: unless-stopped
    ports:
      - "1998:1998"
    environment:
      TZ: ${TZ:-America/New_York}
      # ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./data:/data
